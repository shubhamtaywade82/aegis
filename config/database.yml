default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "postgres") %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "aegis_development") %>

test:
  <<: *default
  database: binance_research_test

production:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "aegis_production") %>